# Central configuration for the API serving layer (api/routes/*).
#
# Secrets stay in .env (ELEVENLABS_API_KEY, GOOGLE_* credentials); everything
# tunable — provider selection, model paths/checkpoints, devices, and the
# vision debug toggle — lives here so models/providers can be swapped without
# touching code. Loaded once at startup by api/routes/config.py.
#
# Each [service] table has a `provider` key; an optional [service.<provider>]
# sub-table holds that provider's kwargs (passed straight to its constructor).
# An empty string ("") means "unset — use the provider's own default".

[vision]
# Pop up Tkinter debug windows showing each vision inference. Disable in prod.
# Requires a display (X / Wayland) on the server. (was VISION_DEBUG in .env)
debug = true

# ---------------------------------------------------------------------------
# STT — Speech-to-Text  (/stt/transcribe)
# ---------------------------------------------------------------------------
[stt]
# "whisper", "google", or "nemo" (Chalk's local NemotronASR).
provider = "whisper"

[stt.nemo]
# Only used when provider = "nemo". Point model_path at the downloaded
# nemotron_asr.pt; device is "cuda" / "cpu" ("" = auto-detect).
model_path = "weights/nemotron_asr.pt"
device = ""
precision = "fp8"

# ---------------------------------------------------------------------------
# TTS — Text-to-Speech  (/tts/synthesize, /tts/synthesize-stream)
# ---------------------------------------------------------------------------
[tts]
# "piper" (local) or "elevenlabs" (needs ELEVENLABS_API_KEY in .env).
provider = "piper"

[tts.piper]
voice_path = "./voices/en_US-lessac-medium.onnx"
voice_name = "en_US-lessac-medium"

[tts.elevenlabs]
voice_id = "fDeOZu1sNd7qahm2fV4k"

# ---------------------------------------------------------------------------
# Object detection  (/object-detection/detect)
# ---------------------------------------------------------------------------
[object_detection]
# "yolo" (fixed 365-class, no masks), "sam3" (open-vocab concept seg), or
# "yoloe" (open-vocab detect + seg, default).
provider = "yoloe"

[object_detection.yolo]
model = "YOLO26l-seg"

[object_detection.sam3]
# Checkpoint must be downloaded manually.
model = ""

[object_detection.yoloe]
# Both auto-download by default.
model = "yoloe-26l-seg.pt"
pf_model = "yoloe-26l-seg-pf.pt"

# ---------------------------------------------------------------------------
# Pose estimation  (/pose-estimation/estimate)
# ---------------------------------------------------------------------------
[pose_estimation]
provider = "yolo_pose"

# ---------------------------------------------------------------------------
# Image caption  (/image-caption/caption, /image-caption/caption-batch)
# ---------------------------------------------------------------------------
[image_caption]
provider = "florence2-base"

# ---------------------------------------------------------------------------
# Image embedding  (/image-embed/embed-image, embed-text, similarity)
# ---------------------------------------------------------------------------
[image_embed]
provider = "clip"

# ---------------------------------------------------------------------------
# Face recognition  (/face-recognition/embed, /face-recognition/info)
# ---------------------------------------------------------------------------
[face_recognition]
provider = "insightface"

# ---------------------------------------------------------------------------
# Appearance / attire re-ID  (/appearance/embed, /appearance/info)
# ---------------------------------------------------------------------------
[appearance]
provider = "osnet"

# ---------------------------------------------------------------------------
# Grasp-pose generation  (/grasp) — GraspNet-1Billion on a supplied point cloud
# ---------------------------------------------------------------------------
[grasp]
provider = "graspnet"

[grasp.graspnet]
# graspnet-baseline checkout (model code + pointnet2/knn CUDA ops) and the
# RealSense checkpoint. "" on device = auto (CUDA when available). The CUDA ops
# under graspnet_root must be built against this venv's torch.
graspnet_root = "~/graspnet-baseline"
checkpoint_path = "~/graspnet-baseline/logs/log_rs/checkpoint-rs.tar"
device = ""
# Inference / sampling.
num_point = 10000
num_view = 300
voxel_size = 0.005
min_points = 200
rerank_pool_size = 200
# Debug: on every request, dump the GraspNet inputs to snapshot_dir (relative to
# the launch cwd) — *_raw.npy (the original cloud, re-POSTable to /grasp), the
# exact *_fed.npy fed to the model, a *_fed.ply for viewing, and a *.json of
# params + point counts. Off in prod; the dir accumulates a few files per request.
snapshot_inputs = true
snapshot_dir = "test_clouds"
# Object-cloud filtering.
outlier_nb_neighbors = 20
outlier_std_ratio = 2.0
cluster_eps = 0.02
cluster_min_samples = 10
# Approach-bias re-rank (used only when a request sets approach_preference to
# "side"/"top" and supplies an "up" vector in the cloud frame). Blend weight for
# the added [0,1] approach-alignment bonus; a per-request approach_weight wins.
approach_weight = 1.0
# Hard-drop "bottom-up" grasps under a "side"/"top" preference: max allowed
# approach·up (col-0 dotted with "up"). 0 keeps only at/below-horizontal
# approaches, a small positive value tolerates a slight upward tilt, 1 disables.
max_approach_up = 0.2
# Centre-bias re-rank ("side" preference only): also favour grasps whose centre
# sits near the object cloud's centroid (grab the middle, not an edge). Blend
# weight for the added [0,1] centrality bonus; 0 disables. Per-request wins.
center_weight = 0.8
# Closing-horizontal bias + filter ("side" preference only): a side approach
# leaves a free roll about it, so the closing/gripper-width axis (col-1) can end
# up vertical — jaws stacked top-to-bottom, gripping "through" an upright object
# taller than the gripper width. closing_weight blends a [0,1] bonus rewarding a
# horizontal closing (0 disables); max_closing_up hard-drops grasps whose closing
# tilts past it (max allowed |closing·up|), 1 disabling the drop. Per-request wins.
closing_weight = 1.0
max_closing_up = 0.4
# Upright-X flip ("side" preference only): after the output rotation offset, roll
# the gripper 180 about its own Z (the approach) whenever its X axis points below
# horizontal, so X always points up. Re-rolls the wrist only; approach unchanged.
# Per-request wins.
upright_x = false
# Invert the upright-X target: force X into the lower ("-up") hemisphere (X down)
# instead of up. Only has an effect when upright_x is on. Per-request wins.
upright_x_inverse = false
# Antipodal validation (used only when a request sets antipodal = true).
select_margin_m = 0.02
normal_radius_m = 0.02
normal_max_nn = 30
antipodal_r_tol_m = 0.01
antipodal_min_pts = 4
width_clearance_m = 0.01
max_gripper_width_m = 0.07
# Output rotation offset, applied about the gripper's own X/Y/Z axes (URDF/ROS
# RPY order Rz·Ry·Rx) to match the robot's tool convention. Pitch re-points
# "forward": +90 puts +Z onto the approach (toward the object), -90 onto -Z.
roll_offset_deg = 0
pitch_offset_deg = 90
yaw_offset_deg = 0
